name: Build LEDSnap iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Write clean UTF-8 files
        run: |
          cat > ios/Runner/AppDelegate.swift << 'SWIFT'
          import UIKit
          import Flutter

          @UIApplicationMain
          @objc class AppDelegate: FlutterAppDelegate {
            override func application(
              _ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
            ) -> Bool {
              GeneratedPluginRegistrant.register(with: self)
              return super.application(application, didFinishLaunchingWithOptions: launchOptions)
            }
          }
          SWIFT

          cat > .gitignore << 'GITIGNORE'
          .dart_tool/
          .flutter-plugins
          .flutter-plugins-dependencies
          .packages
          .pub-cache/
          .pub/
          build/
          ios/Runner.xcodeproj/
          ios/Runner.xcworkspace/
          ios/Flutter/Generated.xcconfig
          ios/Flutter/flutter_export_environment.sh
          ios/Pods/
          ios/Podfile.lock
          .DS_Store
          .idea/
          .vscode/
          *.iml
          GITIGNORE

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Generate Flutter engine files
        run: |
          flutter build ios --release --no-codesign || true
          # Generate the Flutter.framework and app.dill even if signing fails

      - name: Build with xcodebuild (no signing)
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/Runner.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            | xcpretty || true

      - name: Package IPA
        run: |
          APP_PATH=$(find build/Runner.xcarchive -name "*.app" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP_PATH" build/ios/ipa/Payload/
          cd build/ios/ipa
          zip -r LEDSnap.ipa Payload/
          echo "IPA size: $(du -sh LEDSnap.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LEDSnap-iOS
          path: build/ios/ipa/LEDSnap.ipa
          retention-days: 14
