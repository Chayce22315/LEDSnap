name: Build LEDSnap iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Write clean files
        run: |
          cat > ios/Runner/AppDelegate.swift << 'SWIFT'
          import UIKit
          import Flutter

          @UIApplicationMain
          @objc class AppDelegate: FlutterAppDelegate {
            override func application(
              _ application: UIApplication,
              didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
            ) -> Bool {
              GeneratedPluginRegistrant.register(with: self)
              return super.application(application, didFinishLaunchingWithOptions: launchOptions)
            }
          }
          SWIFT

          cat > .gitignore << 'GITIGNORE'
          .dart_tool/
          .flutter-plugins
          .flutter-plugins-dependencies
          .packages
          .pub-cache/
          .pub/
          build/
          ios/Runner.xcodeproj/
          ios/Runner.xcworkspace/
          ios/Flutter/Generated.xcconfig
          ios/Flutter/flutter_export_environment.sh
          ios/Pods/
          ios/Podfile.lock
          .DS_Store
          .idea/
          .vscode/
          *.iml
          GITIGNORE

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Build app with xcodebuild (no signing)
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/derived \
            FLUTTER_ROOT=$FLUTTER_ROOT \
            FLUTTER_APPLICATION_PATH=$PWD \
            FLUTTER_BUILD_DIR=build \
            FLUTTER_BUILD_MODE=release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            build

      - name: Package IPA
        run: |
          APP=$(find build/derived -name "Runner.app" -not -path "*/simulator/*" | head -1)
          echo "Found: $APP"
          mkdir -p build/ios/ipa/Payload
          cp -r "$APP" build/ios/ipa/Payload/Runner.app
          cd build/ios/ipa
          zip -r LEDSnap.ipa Payload/
          echo "Done: $(du -sh LEDSnap.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LEDSnap-iOS
          path: build/ios/ipa/LEDSnap.ipa
          retention-days: 14
